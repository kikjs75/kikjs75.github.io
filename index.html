<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Template</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body class="bg-gray-100">
    <div class="flex">
      <aside
        class="bg-gray-800 w-64 h-screen flex flex-col py-7 px-2 space-y-6"
      >
        <div>
          <h2 class="text-white text-2xl font-semibold px-4 mb-6">대시보드</h2>
        </div>
        <nav class="flex flex-col space-y-4">
          <a
            href="#"
            class="mb-2 py-2.5 px-4 hover:bg-gray-700 rounded trasition duration-200"
          >
            <i class="fa-solid fa-house text-white mr-2"></i>
            <span class="text-white">홈</span>
          </a>
          <a
            href="#"
            class="mb-2 py-2.5 px-4 hover:bg-gray-700 rounded trasition duration-200"
          >
            <i class="fa-solid fa-chart-bar text-white mr-2"></i>
            <span class="text-white">분석</span>
          </a>
          <a
            href="#"
            class="mb-2 py-2.5 px-4 hover:bg-gray-700 rounded trasition duration-200"
          >
            <i class="fa-solid fa-list text-white mr-2"></i>
            <span class="text-white">작업 관리</span>
          </a>
          <a
            href="#"
            class="mb-2 py-2.5 px-4 hover:bg-gray-700 rounded trasition duration-200"
          >
            <i class="fa-solid fa-gear text-white mr-2"></i>
            <span class="text-white">설정</span>
          </a>
        </nav>
      </aside>
      <div class="flex-1 flex flex-col">
        <header
          class="bg-white border-b-4 border-indigo-600 h-16 flex justify-between items-center px-6 py-2"
        >
          <div class="relative">
            <span class="absolute left-0 inset-y-0 pl-3 flex items-center"
              ><i class="fas fa-search text-gray-500"></i
            ></span>
            <input
              type="text"
              placeholder="검색"
              class="focus:border-indigo-600 h-10 w-64 pl-10 pr-4 rounded-md"
            />
          </div>
          <div class="flex items-center gap-x-4">
            <button class="text-gray-600">
              <i class="fas fa-bell"></i>
            </button>
            <button class="w-5 h-5 rounded-full overflow-hidden">
              <img
                src="https://api.dicebear.com/9.x/fun-emoji/svg?seed=Jade"
                alt="avatar"
              />
            </button>
          </div>
        </header>
        <main class="flex-1 bg-gray-200"></main>
      </div>
    </div>
  </body>
</html>
